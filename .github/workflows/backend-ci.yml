name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .
      APP_NAME: PulseFi
      APP_VERSION: 0.1.0
      DEBUG: "True"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+asyncpg://ci_user:ci_password@localhost:5432/pulsefi_ci
      SECRET_KEY: ci_test_secret_key_replace_in_real_deployment_123456
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import FastAPI app
        run: |
          python -c "from app.main import app; print('App imported successfully')"

      - name: Import API router
        run: |
          python -c "from app.api.v1.router import api_router; print('API router imported successfully')"

      - name: Compile Python files
        run: |
          python -m compileall app alembic tests

      - name: Run tests
        run: |
          python -m pytest
